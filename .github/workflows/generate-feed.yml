name: Generate Feed

on:
  schedule:
    # Daily at 04:00 UTC (~06:00 Europe/Paris in summer / 05:00 in winter).
    # Picked to sit in the overnight low of the French news cycle: yesterday's
    # evening + overnight coverage has landed, the morning publishing surge
    # hasn't started, so the cutoff slices through the fewest in-progress
    # stories. A 48h lookback + carry-over (see generate-feed.js) then re-clusters
    # any event whose coverage still spans the cutoff, so it isn't split in two.
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: cd scripts && npm install
      - name: Generate feed
        run: cd scripts && node generate-feed.js
      - name: Commit feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.json state-feed.json
          git diff --cached --quiet || git commit -m "chore: update feed [skip ci]"
          git push
