name: Generate Feed

on:
  schedule:
    # Daily at 00:00 UTC (~02:00 Europe/Paris in summer / 01:00 in winter).
    # Scheduled early to absorb GitHub's typical 3-4h queue delay and still
    # land before the morning publishing surge. A 48h lookback + carry-over
    # (see generate-feed.js) re-clusters any event whose coverage spans the
    # cutoff, so it isn't split in two.
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: cd scripts && npm install
      - name: Generate feed
        run: cd scripts && node generate-feed.js
      - name: Commit feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.json state-feed.json
          git diff --cached --quiet || git commit -m "chore: update feed [skip ci]"
          git push
